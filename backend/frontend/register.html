<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your AI-RecruitX account — start screening resumes with AI.">
    <title>Register — AI-RecruitX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="auth-wrapper">
    <!-- Background orbs -->
    <div class="hero-bg">
        <div class="hero-orb" style="top:-200px; right:-200px; width:600px; height:600px; background:#8b5cf6; opacity:0.12; filter:blur(120px); animation: orbMove1 8s ease-in-out infinite;"></div>
        <div class="hero-orb" style="bottom:-200px; left:-100px; width:500px; height:500px; background:#6366f1; opacity:0.1; filter:blur(100px); animation: orbMove2 11s ease-in-out infinite;"></div>
        <div class="hero-orb" style="top:50%; left:40%; width:300px; height:300px; background:#06b6d4; opacity:0.06; filter:blur(80px); animation: orbMove3 14s ease-in-out infinite;"></div>
        <div class="hero-noise"></div>
        <div class="hero-grid"></div>
    </div>

    <!-- Register Card -->
    <div class="auth-card">
        <a href="index.html" style="position:absolute; top:32px; right:32px; color:var(--text-tertiary); font-size:13px; display:flex; align-items:center; gap:6px; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-tertiary)'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Home
        </a>

        <div class="auth-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="url(#lgReg)"/><defs><linearGradient id="lgReg" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366f1"/><stop offset="0.5" stop-color="#8b5cf6"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs><path d="M7 8h10M7 12h7M7 16h10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span class="gradient-text-accent">AI-RecruitX</span>
        </div>

        <h1>Create your account</h1>
        <p class="auth-subtitle">Start screening resumes with AI</p>

        <div class="social-login" style="display:flex; gap:12px; margin-bottom:24px;">
            <button type="button" class="btn" style="flex:1; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); color:var(--text-secondary);" onclick="showToast('Google login coming soon!', 'info')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>
            <button type="button" class="btn" style="flex:1; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); color:var(--text-secondary);" onclick="showToast('LinkedIn login coming soon!', 'info')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#0077b5"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                LinkedIn
            </button>
        </div>
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
            <div style="flex:1; height:1px; background:rgba(255,255,255,0.06);"></div>
            <span style="font-size:12px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:1px;">Or email</span>
            <div style="flex:1; height:1px; background:rgba(255,255,255,0.06);"></div>
        </div>

        <div class="error-box" id="errorBox">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span id="errorMessage"></span>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="regName" placeholder="Manmath Patel" required autocomplete="name" maxlength="100">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" id="regEmail" placeholder="name@example.com" required autocomplete="email" maxlength="255">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    <input type="password" id="regPassword" placeholder="Min 8 characters" required autocomplete="new-password" minlength="8" maxlength="100" oninput="updatePasswordStrength()">
                    <button type="button" class="eye-toggle" onclick="togglePasswordVisibility('regPassword', this)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-segment" id="seg1"></div>
                    <div class="strength-segment" id="seg2"></div>
                    <div class="strength-segment" id="seg3"></div>
                    <div class="strength-segment" id="seg4"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    <input type="password" id="regConfirm" placeholder="Re-enter password" required autocomplete="new-password">
                </div>
                <small id="matchError" style="color:var(--danger); font-size:12px; display:none;">Passwords do not match</small>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" id="registerBtn" style="width:100%; margin-top:8px;">
                <span id="registerBtnText">Create Account →</span>
                <div class="spinner" id="registerSpinner" style="display:none;"></div>
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html" onclick="event.preventDefault(); navigate('login.html');">Sign in →</a>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
    // Redirect if already logged in
    redirectIfLoggedIn();

    function togglePasswordVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.innerHTML = isPassword
            ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
            : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }

    function updatePasswordStrength() {
        const password = document.getElementById('regPassword').value;
        let score = 0;
        if (password.length >= 8) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;

        const colors = ['', '#ef4444', '#f59e0b', '#eab308', '#10b981'];
        for (let i = 1; i <= 4; i++) {
            const seg = document.getElementById('seg' + i);
            seg.style.background = i <= score ? colors[score] : 'rgba(255,255,255,0.08)';
        }
    }

    function showError(msg) {
        const box = document.getElementById('errorBox');
        document.getElementById('errorMessage').textContent = msg;
        box.classList.add('visible');
    }

    function hideError() {
        document.getElementById('errorBox').classList.remove('visible');
    }

    function setLoading(loading) {
        const btn = document.getElementById('registerBtn');
        const text = document.getElementById('registerBtnText');
        const spinner = document.getElementById('registerSpinner');
        btn.disabled = loading;
        text.style.display = loading ? 'none' : 'inline';
        spinner.style.display = loading ? 'block' : 'none';
    }

    async function handleRegister(e) {
        e.preventDefault();
        hideError();
        document.getElementById('matchError').style.display = 'none';

        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;

        if (!name || !email || !password || !confirm) {
            showError('Please fill in all fields.');
            return;
        }

        if (password.length < 8) {
            showError('Password must be at least 8 characters.');
            return;
        }

        if (password !== confirm) {
            document.getElementById('matchError').style.display = 'block';
            return;
        }

        setLoading(true);

        try {
            // Register
            await apiRegister(name, email, password);

            // Auto-login
            const loginData = await apiLogin(email, password);
            const tokenPayload = JSON.parse(atob(loginData.access_token.split('.')[1]));
            const user = {
                id: tokenPayload.user_id,
                email: tokenPayload.email,
                name: name
            };
            saveAuth(loginData.access_token, user);
            showToast('Account created! Welcome aboard 🎉', 'success');
            setTimeout(() => navigate('dashboard.html'), 500);
        } catch (err) {
            showError(err.message);
            setLoading(false);
        }
    }
</script>

</body>
</html>
